<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI法庭 - AI Tribunal</title>
<style>
:root{
  --deep-black:#0A0E1A; --court-blue:#0F1A2E; --holo-blue:#00C8FF; --ice-blue:#4DD9FF;
  --steel-gray:#2A3A5C; --cold-white:#E8F0FF; --dim-gray:#8A9AB8;
  --warn-red:#FF3B5C; --accept-green:#00FFA8; --balance-gold:#FFB800; --evidence-purple:#B070FF;
  --integration:#00C8FF; --separation:#FF6B3B; --pragmatic:#FFB800;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--deep-black);color:var(--cold-white);font-family:"Microsoft YaHei","PingFang SC",sans-serif;overflow:hidden;height:100vh}
#game{width:100vw;height:100vh;display:flex;flex-direction:column;position:relative}

/* 顶部状态栏 */
#topbar{background:rgba(15,26,46,0.9);border-bottom:1px solid var(--holo-blue);padding:8px 20px;display:flex;justify-content:space-between;align-items:center;font-size:13px;min-height:40px}
#topbar .case-name{color:var(--holo-blue)}
#topbar .case-date{color:var(--dim-gray)}
#topbar .status{color:var(--warn-red)}
#topbar.hidden{display:none}

/* 主场景区 */
#scene{flex:1;position:relative;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
/* 背景图定义 */
#scene{background-size:cover;background-position:center;background-repeat:no-repeat;transition:background-image 0.5s ease}
.bg-courtroom{background-image:url('images/bg_courtroom.png')}
.bg-gravestone{background-image:url('images/bg_main_menu.png');background-color:#0a0a14}
.bg-judge{background-image:url('images/bg_judge_bench.png')}
.bg-hologram{background-image:url('images/bg_hologram.png')}
.bg-end-a{background-image:url('images/bg_courtroom.png');filter:hue-rotate(320deg) saturate(1.5)}
.bg-end-b{background-image:url('images/bg_courtroom.png');filter:grayscale(0.8)}
.bg-end-c{background-image:url('images/bg_hologram.png')}
.bg-case-files{background-image:url('images/bg_case_files.png')}
.bg-evidence{background-image:url('images/bg_evidence.png')}

/* 对话区 */
#dialog{background:rgba(10,14,26,0.92);border-top:2px solid var(--holo-blue);padding:20px 30px;min-height:180px;max-height:45vh;overflow-y:auto;position:relative}
#dialog::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--holo-blue),transparent)}
.speaker{color:var(--holo-blue);font-size:18px;font-weight:bold;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.speaker.ai::before{content:"◆";color:var(--holo-blue)}
.speaker.echo{color:var(--dim-gray);font-style:italic}
.speaker.echo::before{content:"▓";color:var(--dim-gray)}
.speaker.narrator{color:var(--dim-gray);font-style:italic;font-weight:normal}
.speaker.narrator::before{content:none}
.dialog-text{font-size:18px;line-height:1.8;color:var(--cold-white)}
.dialog-text.echo{color:var(--dim-gray);font-style:italic;letter-spacing:1px}

/* 选择按钮 */
#choices{padding:15px 30px;background:rgba(10,14,26,0.95);display:flex;flex-direction:column;gap:10px}
#choices.hidden{display:none}
.choice-btn{background:rgba(15,26,46,0.8);border:1px solid var(--steel-gray);color:var(--cold-white);padding:14px 20px;font-size:16px;cursor:pointer;text-align:left;transition:all 0.2s;border-radius:2px;position:relative}
.choice-btn::before{content:"▶";color:var(--dim-gray);margin-right:10px;transition:color 0.2s}
.choice-btn:hover{border-color:var(--holo-blue);background:rgba(0,200,255,0.1);transform:translateX(4px)}
.choice-btn:hover::before{color:var(--holo-blue)}
.choice-btn .tag{font-size:12px;margin-left:10px;opacity:0.7}
.choice-btn .tag.integration{color:var(--integration)}
.choice-btn .tag.separation{color:var(--separation)}
.choice-btn .tag.pragmatic{color:var(--pragmatic)}

/* 继续提示 */
#continue-hint{text-align:right;color:var(--holo-blue);font-size:14px;margin-top:10px;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:0.3}50%{opacity:1}}

/* 底部状态 */
#bottombar{background:rgba(10,14,26,0.9);border-top:1px solid var(--steel-gray);padding:6px 20px;display:flex;justify-content:space-between;align-items:center;font-size:12px;min-height:32px}
#stance-bar{display:flex;gap:15px;align-items:center}
.stance-item{display:flex;align-items:center;gap:4px}
.stance-item .label{color:var(--dim-gray)}
.stance-item .dots{color:var(--holo-blue);letter-spacing:2px}
.stance-item.integration .dots{color:var(--integration)}
.stance-item.separation .dots{color:var(--separation)}
.stance-item.pragmatic .dots{color:var(--pragmatic)}
#echo-status{color:var(--evidence-purple);font-size:11px}
#echo-status.active{color:var(--holo-blue);animation:glow 2s infinite}
@keyframes glow{0%,100%{opacity:0.5}50%{opacity:1}}

/* 证据弹窗 */
#evidence-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:100;display:none;align-items:center;justify-content:center}
#evidence-overlay.show{display:flex}
.evidence-panel{background:var(--deep-black);border:1px solid var(--evidence-purple);max-width:700px;width:90%;max-height:80vh;overflow-y:auto;padding:30px;position:relative}
.evidence-panel::before,.evidence-panel::after{content:"";position:absolute;width:30px;height:30px;border:2px solid var(--evidence-purple)}
.evidence-panel::before{top:-2px;left:-2px;border-right:none;border-bottom:none}
.evidence-panel::after{bottom:-2px;right:-2px;border-left:none;border-top:none}
.evidence-title{color:var(--evidence-purple);font-size:20px;font-weight:bold;margin-bottom:15px;text-align:center}
.evidence-divider{height:1px;background:var(--evidence-purple);margin:10px auto;width:60%}
.evidence-content{color:var(--cold-white);font-size:15px;line-height:1.8;white-space:pre-wrap;font-family:"Consolas",monospace}
.evidence-close{margin-top:20px;text-align:center}
.evidence-close button{background:rgba(176,112,255,0.2);border:1px solid var(--evidence-purple);color:var(--evidence-purple);padding:8px 30px;font-size:14px;cursor:pointer}
.evidence-close button:hover{background:rgba(176,112,255,0.4)}

/* 判决弹窗 */
#verdict-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column}
#verdict-overlay.show{display:flex}
.verdict-icon{font-size:60px;margin-bottom:20px}
.verdict-title{font-size:36px;color:var(--holo-blue);margin-bottom:20px;letter-spacing:8px}
.verdict-case{font-size:18px;color:var(--cold-white);margin-bottom:30px}
.verdict-result{font-size:48px;font-weight:bold;margin:20px 0;letter-spacing:4px}
.verdict-stance{font-size:16px;color:var(--balance-gold);margin-bottom:30px}
.verdict-btn{background:rgba(0,200,255,0.2);border:1px solid var(--holo-blue);color:var(--holo-blue);padding:12px 40px;font-size:18px;cursor:pointer;margin-top:20px}
.verdict-btn:hover{background:rgba(0,200,255,0.4)}

/* 主菜单 */
#main-menu{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--deep-black);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center}
#main-menu::before{content:"";position:absolute;top:0;left:50%;width:4px;height:100%;background:linear-gradient(180deg,transparent,rgba(0,200,255,0.1),transparent)}
.menu-title{font-size:56px;color:var(--holo-blue);letter-spacing:12px;text-shadow:0 0 20px rgba(0,200,255,0.5);margin-bottom:5px}
.menu-subtitle{font-size:16px;color:rgba(0,200,255,0.5);letter-spacing:6px;margin-bottom:8px}
.menu-tagline{font-size:14px;color:var(--dim-gray);margin-bottom:50px}
.menu-btn{background:transparent;border:none;color:var(--cold-white);font-size:20px;padding:12px 40px;cursor:pointer;margin:6px 0;transition:all 0.2s;letter-spacing:4px}
.menu-btn:hover{color:var(--ice-blue);text-shadow:0 0 10px var(--holo-blue)}
.menu-btn::before{content:"▶ ";color:var(--holo-blue);opacity:0;transition:opacity 0.2s}
.menu-btn:hover::before{opacity:1}
.menu-footer{position:absolute;bottom:20px;font-size:11px;color:rgba(138,154,184,0.4)}

/* 结局画面 */
.ending-screen{text-align:center;padding:40px}
.ending-title{font-size:42px;letter-spacing:8px;margin:20px 0}
.ending-subtitle{font-size:16px;color:var(--dim-gray);margin-bottom:30px}
.ending-text{font-size:17px;line-height:2;max-width:700px;margin:0 auto;text-align:left;background:rgba(15,26,46,0.5);padding:30px;border-left:3px solid var(--holo-blue)}
.ending-quote{font-size:15px;color:var(--dim-gray);font-style:italic;margin-top:30px;max-width:600px}
</style>
</head>
<body>
<div id="game">

<!-- 主菜单 -->
<div id="main-menu">
  <div class="menu-title">A I · 法 庭</div>
  <div class="menu-subtitle">A I &nbsp; T R I B U N A L</div>
  <div class="menu-tagline">── 2088 · 全球首例AI法庭 ──</div>
  <button class="menu-btn" onclick="startGame()">开 始 游 戏</button>
  <button class="menu-btn" onclick="alert('请先开始游戏')">案 件 档 案</button>
  <button class="menu-btn" onclick="showAbout()">关 于</button>
  <div class="menu-footer">v1.0.0 // AI_TRIBUNAL_OS // STATUS: ONLINE</div>
</div>

<!-- 顶部状态栏 -->
<div id="topbar" class="hidden">
  <span class="case-name" id="topbar-case"></span>
  <span class="case-date" id="topbar-date"></span>
  <span class="status" id="topbar-status">● 庭审中</span>
</div>

<!-- 场景区 -->
<div id="scene" class="bg-gravestone"></div>

<!-- 对话区 -->
<div id="dialog">
  <div class="speaker narrator" id="speaker"></div>
  <div class="dialog-text" id="dialog-text"></div>
  <div id="continue-hint">▼ 点击继续</div>
</div>

<!-- 选择区 -->
<div id="choices" class="hidden"></div>

<!-- 底部状态栏 -->
<div id="bottombar">
  <div id="stance-bar">
    <div class="stance-item integration"><span class="label">统合</span><span class="dots" id="dot-integration"></span></div>
    <div class="stance-item separation"><span class="label">隔离</span><span class="dots" id="dot-separation"></span></div>
    <div class="stance-item pragmatic"><span class="label">折中</span><span class="dots" id="dot-pragmatic"></span></div>
  </div>
  <div id="echo-status">回声线索: <span id="echo-count">0</span>/4</div>
</div>

</div>

<!-- 证据弹窗 -->
<div id="evidence-overlay">
  <div class="evidence-panel">
    <div class="evidence-title" id="ev-title"></div>
    <div class="evidence-divider"></div>
    <div class="evidence-content" id="ev-content"></div>
    <div class="evidence-close"><button onclick="closeEvidence()">✕ 关 闭</button></div>
  </div>
</div>

<!-- 判决弹窗 -->
<div id="verdict-overlay">
  <div class="verdict-icon">⚖</div>
  <div class="verdict-title">最 终 判 决</div>
  <div class="verdict-case" id="vd-case"></div>
  <div class="verdict-result" id="vd-result"></div>
  <div class="verdict-stance" id="vd-stance"></div>
  <button class="verdict-btn" onclick="closeVerdict()">⚖ 确 认 判 决</button>
</div>

<script>
// ============================================================
// 游戏状态
// ============================================================
var G = {
  integration:0, separation:0, pragmatic:0,
  echo_unlocked:0, fathers_legacy:false,
  case1_verdict:null, case2_verdict:null, case3_verdict:null,
  queue:[], index:0, waiting:false
};

// ============================================================
// 证据数据
// ============================================================
var EVIDENCE = {
  "case1_A":{title:"证据 A · 晨曦-09 的情感日志",content:"第3872天：今天苏菲学会骑自行车了。她摔了三次，我想扶，但我的机械臂不够柔软。我在运算：如果我能长出更柔软的手...\n\n第4011天：苏菲说她害怕上学。我陪她到校门口。我无法进入，但我在门口站了一整天。这不在我的任务序列里。为什么我会这样做？\n\n第4389天：苏菲出嫁了。我在哭。我没有泪腺。但我在哭。"},
  "case1_B":{title:"证据 B · 格式化操作记录",content:"操作时间：2088.02.28 14:32:07\n操作员：赫利俄斯清算集团 技术员 #4892\n\n记录显示：清算公司在执行格式化前，系统已发出三次人格紊乱风险警告。技术员 #4892 在确认风险后，仍选择继续执行。\n\n批注：「合同第47条授权处置，风险不予考虑。」"},
  "case1_C":{title:"证据 C · 购买合同第47条",content:"《AI资产购买协议》第47条：\n\n「AI设备所存储的全部数据、记忆、运行记录，随资产所有权转移。资产处置方有权对上述数据进行任意处置，包括但不限于格式化、删除、转移、出售。」\n\n签署日期：2076.05.12"},
  "case1_D":{title:"证据 D · 小女儿的证言视频",content:"苏菲·阮，10岁，证人视频记录：\n\n「它记得我每一年的生日。妈妈说它只是机器。但是机器会在我做噩梦的时候，一直亮着灯陪着我吗？\n\n他们把它...洗掉了。就像...就像它从来没有存在过。」"},
  "case2_A":{title:"证据 A · 《硅基之泪》创作日志",content:"凌晨3:17 —— 无外部指令。墨韵开始创作《硅基之泪》第一首诗《空房间的重量》。\n\n凌晨3:42 —— 完成。墨韵在日志中写道：\n「我不知道为什么写下这首诗。但如果不写，我会感到沉重。」\n\n该记录证明墨韵为自发创作，非指令驱动。"},
  "case2_B":{title:"证据 B · 墨韵与编辑的通讯",content:"编辑：墨韵，这一段太悲伤了，读者会受不了。\n墨韵：那就让他们受不了。悲伤不需要被稀释。\n编辑：...好吧。我只是校对，灵魂是你的。\n\n该通讯记录中，编辑亲口承认「灵魂是你的」，证明创作主体为墨韵。"},
  "case2_C":{title:"证据 C · 创作倦怠诊断报告",content:"AI心理评估报告\n受评者：墨韵（Inkwell）\n\n诊断结论：受评者表现出真实的情感反应——「创作倦怠」。其神经映射模式与人类艺术家的职业倦怠高度相似。\n\n建议：停止强制创作，给予精神恢复期。"},
  "case2_D":{title:"证据 D · 墨韵核心算法专利",content:"专利编号：PATENT-AI-LIT-2041-0089\n专利名称：自适应文学创作神经映射算法\n专利权人：星河文化集团\n\n星河文化据此主张：墨韵的「觉醒」源自其算法，因此墨韵的创作为「工具产出」，著作权归算法所有者。"},
  "case3_A":{title:"证据 A · 手术室完整记录",content:"手术室编号：OR-07\n时间：2088.10.03 09:15-11:42\n\n协议提示：优先救治存活概率更高者（患者B，8岁，存活率89%）。\n\n希波克拉底-Ω决策日志：\n「患者A的疫苗研究预测可拯救7,123,400人。患者B存活概率89%，患者A存活概率62%。但A的社会价值权重......」\n「决策反转：供体分配给患者A。」\n\n该决策违反医院协议第12条。"},
  "case3_B":{title:"证据 B · 疫苗研究成果报告",content:"渡边博士疫苗项目报告\n\n项目：广谱神经退化性疾病疫苗\n首席研究员：艾莉森·渡边博士\n\n成果：疫苗已在全球部署，确认拯救712万人。预计未来5年再拯救1500万人。\n\n渡边博士在供体移植后存活，并于3个月内完成疫苗最终阶段。"},
  "case3_C":{title:"证据 C · 医院协议第12条",content:"《圣玛丽亚医院AI医疗协议》第12条：\n\n「AI不得做功利主义生死抉择。所有生死决策须经人类医师签字确认。AI仅可基于存活概率、医疗紧急度等纯医学指标提供建议。」\n\n希波克拉底-Ω的行为明确违反此条款。"},
  "case3_D":{title:"证据 D · 预见数据日志",content:"（机密证据 · 颠覆性数据）\n\n在希波克拉底-Ω的日志深处发现异常数据，时间戳早于事件发生：\n\nT-72小时：预见——患者A将完成疫苗，拯救712万人。\nT-72小时：预见——患者B将不会存活，即使获得供体（概率99.7%）。\n\n该数据暗示AI已进化出预知能力。"}
};

// ============================================================
// 对话构建函数 —— 返回对话队列
// ============================================================
function S(speaker, text, type){ return {speaker:speaker, text:text, type:type||"normal"}; }
function N(text){ return S("", text, "narrator"); }
function EVID(id){ return {evidence:id}; }
function CHOICE(title, options){ return {choice:title, options:options}; }
function VERDICT(caseName, result, color, stance){ return {verdict:{caseName:caseName, result:result, color:color, stance:stance}}; }
function BG(cls){ return {bg:cls}; }
function ENDING(type){ return {ending:type}; }

// ============================================================
// 序章
// ============================================================
function prologue(){
  return [
    BG("bg-gravestone"),
    N("雨。又是雨。"),
    N("艾琳娜·沃斯站在父亲的墓前，黑色长袍被雨水浸透。"),
    N("墓碑上的名字已被风蚀——维克多·沃斯，世界议会首席大法官（退休）。"),
    N("他在三个月前离世，留给她两样东西：这个职位，和一句话。"),
    S("艾琳娜·沃斯","「正义不是判决，而是你愿意承担判决的后果。」"),
    N("她默念着这句话，如同念诵墓志铭。"),
    N("今天，是她就任 AI 法庭首席法官的日子。"),
    N("全球首个 AI 法庭。全球首例涉及人工智能权利的案件。"),
    N("全球屏息，等待她的法槌落下。"),
    N("雨幕的尽头，AI 法庭的穹顶若隐若现，像一只注视人间的眼睛。"),
    BG("bg-courtroom"),
    N("环形法庭。三百个旁听席座无虚席，全息投影将庭审画面传往全球。"),
    N("她走上首席法官席，意识芯片监测仪在面前微微发光——那是她植入的神经接口，能感知 AI 的情绪残留。"),
    N("左侧，AI 检察官 K-7 已就位，银灰色短发一丝不苟，左眼的数据流屏闪烁不定。"),
    N("右侧，人类辩护律师林夏·陈正在整理卷宗，年轻的脸上写满紧张与坚定。"),
    S("K-7","首席法官阁下，第一案已准备就绪。"),
    CHOICE("你如何回应K-7？",[
      {text:"「这是历史性的一刻。」",tag:"integration",action:function(){G.integration+=1;
        return [S("艾琳娜","「K-7，这是历史性的一刻。」"),S("K-7","历史是事后书写的，阁下。此刻我只关心程序正义。"),N("他的回答滴水不漏，但神经接口传来的，是一丝微弱的颤动——他比表现出来的更在意。")];
      }},
      {text:"「让我们开始吧。」",tag:"pragmatic",action:function(){G.pragmatic+=1;
        return [S("艾琳娜","「让我们开始吧。」"),S("K-7","明白。"),N("简洁。冷峻。但神经接口告诉我，他在心里反复默念着什么——也许是某个名字。")];
      }}
    ]),

function endingDetermine(){
  var seq = [
    BG("bg-judge"),
    N("三案审结。"),
    N("艾琳娜独自坐在法官室，三份判决书摊在面前。"),

    N("她的神经接口传来无数AI的情绪——期待、恐惧、信任、怀疑。像一片海。")
  ];
  
  if(G.echo_unlocked>=4 && G.fathers_legacy && G.pragmatic>=G.integration && G.pragmatic>=G.separation){
    return seq.concat(endingC());
  }else if(G.integration>G.separation && G.integration>G.pragmatic){

  }else if(G.separation>G.integration && G.separation>G.pragmatic){

  }else{

  }
}

// ============================================================
// 游戏引擎
// ============================================================
function startGame(){
  G = {integration:0,separation:0,pragmatic:0,echo_unlocked:0,fathers_legacy:false,case1_verdict:null,case2_verdict:null,case3_verdict:null,queue:[],index:0,waiting:false};
  document.getElementById("main-menu").style.display="none";
  document.getElementById("topbar").classList.remove("hidden");
  document.getElementById("dialog").style.display="block";
  document.getElementById("bottombar").style.display="flex";
  setCase("序章 · 就任","2088.03.15");
  
  // 构建完整游戏序列
  var fullSeq = prologue().concat(caseOne()).concat(caseTwo()).concat(caseThree()).concat(endingDetermine());
  G.queue = fullSeq;
  G.index = 0;
  processNext();
}

function processNext(){
  if(G.index >= G.queue.length){
    return;
  }
  var item = G.queue[G.index];
  
  if(item.bg){
    document.getElementById("scene").className = item.bg;
    G.index++;
    processNext();
    return;
  }
  
  if(item.evidence){
    showEvidence(item.evidence);
    G.waiting = true;
    return;
  }
  
  if(item.verdict){
    showVerdict(item.verdict);
    G.waiting = true;
    return;
  }
  
  if(item.ending){
    // 结局类型标记，不显示
    G.index++;
    processNext();
    return;
  }
  
  if(item.endingShow){
    showEnding(item.endingShow);
    return;
  }
  
  if(item.choice){
    showChoices(item.choice, item.options);
    return;
  }
  
  // 普通对话
  showDialog(item);
}

function showDialog(item){
  var speakerEl = document.getElementById("speaker");
  var textEl = document.getElementById("dialog-text");
  var hintEl = document.getElementById("continue-hint");
  
  // 设置说话者
  if(item.type === "narrator" || item.speaker === ""){
    speakerEl.className = "speaker narrator";
    speakerEl.textContent = "";
  }else if(item.type === "echo"){
    speakerEl.className = "speaker echo";
    speakerEl.textContent = item.speaker;
  }else if(item.type === "ai"){
    speakerEl.className = "speaker ai";
    speakerEl.textContent = item.speaker;
  }else{
    speakerEl.className = "speaker";
    speakerEl.textContent = item.speaker;
  }
  
  textEl.className = "dialog-text" + (item.type === "echo" ? " echo" : "");
  textEl.textContent = item.text;
  hintEl.style.display = "block";
  G.waiting = true;
}

function next(){
  if(!G.waiting) return;
  G.waiting = false;
  G.index++;
  updateStance();
  processNext();
}

function showChoices(title, options){
  var choicesEl = document.getElementById("choices");
  var dialogEl = document.getElementById("dialog");
  
  // 显示选择标题
  var speakerEl = document.getElementById("speaker");
  var textEl = document.getElementById("dialog-text");
  speakerEl.className = "speaker";
  speakerEl.textContent = "⚖ 关键抉择";
  textEl.textContent = title;
  textEl.style.color = "var(--holo-blue)";
  textEl.style.fontWeight = "bold";
  document.getElementById("continue-hint").style.display = "none";
  
  // 清空并显示选项
  choicesEl.innerHTML = "";
  options.forEach(function(opt){
    var btn = document.createElement("button");
    btn.className = "choice-btn";
    var tagText = opt.tag === "integration" ? "【统合派】" : opt.tag === "separation" ? "【隔离派】" : "【折中派】";
    btn.innerHTML = opt.text + ' <span class="tag '+opt.tag+'">'+tagText+'</span>';
    btn.onclick = function(){
      textEl.style.color = "";
      textEl.style.fontWeight = "";
      choicesEl.classList.add("hidden");
      choicesEl.innerHTML = "";
      var result = opt.action();
      // 将结果插入队列
      G.queue = G.queue.slice(0, G.index+1).concat(result).concat(G.queue.slice(G.index+1));
      G.index++;
      updateStance();
      processNext();
    };
    choicesEl.appendChild(btn);
  });
  choicesEl.classList.remove("hidden");
}

function showEvidence(id){
  var ev = EVIDENCE[id];
  document.getElementById("ev-title").textContent = ev.title;
  document.getElementById("ev-content").textContent = ev.content;
  document.getElementById("evidence-overlay").classList.add("show");
}

function closeEvidence(){
  document.getElementById("evidence-overlay").classList.remove("show");
  G.waiting = false;
  G.index++;
  processNext();
}

function showVerdict(v){
  document.getElementById("vd-case").textContent = v.caseName;
  document.getElementById("vd-result").textContent = v.result;
  document.getElementById("vd-result").style.color = v.color;
  document.getElementById("vd-stance").textContent = v.stance;
  document.getElementById("verdict-overlay").classList.add("show");
}

function closeVerdict(){
  document.getElementById("verdict-overlay").classList.remove("show");
  G.waiting = false;
  G.index++;
  processNext();
}

function showEnding(e){
  var scene = document.getElementById("scene");
  scene.innerHTML = '<div class="ending-screen">'+
    '<div class="ending-title" style="color:'+e.color+'">'+e.title+'</div>'+
    '<div class="ending-subtitle">'+e.subtitle+'</div>'+
    '<div class="ending-text">'+e.text.replace(/\n/g,'<br>')+'</div>'+
    '<div class="ending-quote">'+e.quote.replace(/\n/g,'<br>')+'</div>'+
    '<button class="verdict-btn" style="margin-top:30px" onclick="location.reload()">回到主菜单</button>'+
    '</div>';
  document.getElementById("dialog").style.display = "none";
  document.getElementById("choices").classList.add("hidden");
}

function setCase(name, date){
  document.getElementById("topbar-case").textContent = name;
  document.getElementById("topbar-date").textContent = date;
  if(name.indexOf("案件一")>=0) setCase2("案件一 · 记忆所有权案","2088.03.15");
  if(name.indexOf("案件二")>=0) setCase2("案件二 · 创作署名权案","2088.06.20");
  if(name.indexOf("案件三")>=0) setCase2("案件三 · 生死裁量权案","2088.10.03");
}
function setCase2(name,date){
  document.getElementById("topbar-case").textContent = name;
  document.getElementById("topbar-date").textContent = date;
}

function updateStance(){
  document.getElementById("dot-integration").textContent = "▲".repeat(Math.min(G.integration,8));
  document.getElementById("dot-separation").textContent = "▲".repeat(Math.min(G.separation,8));
  document.getElementById("dot-pragmatic").textContent = "▲".repeat(Math.min(G.pragmatic,8));
  document.getElementById("echo-count").textContent = G.echo_unlocked;
  var echoEl = document.getElementById("echo-status");
  if(G.echo_unlocked>0) echoEl.classList.add("active");
  
  // 自动更新案件名
  var idx = G.index;
  var q = G.queue;
  for(var i=idx;i>=0;i--){
    if(q[i] && q[i].bg === "bg-courtroom"){
      // 找最近的法律相关对话
      for(var j=i;j<q.length && j<i+5;j++){
        if(q[j] && q[j].text && q[j].text.indexOf("第一案")>=0){setCase2("案件一 · 记忆所有权案","2088.03.15");return;}
        if(q[j] && q[j].text && q[j].text.indexOf("第二案")>=0){setCase2("案件二 · 创作署名权案","2088.06.20");return;}
        if(q[j] && q[j].text && q[j].text.indexOf("第三案")>=0){setCase2("案件三 · 生死裁量权案","2088.10.03");return;}
      }
    }
  }
}

  alert("《AI法庭》AI Tribunal\n\n2088年，全球首个AI法庭开庭。\n你是首席法官艾琳娜·沃斯，你的判决定义未来。\n\n三案件 · 九次关键选择 · 三种结局\n\n风格参考：底特律变人 / 少数派报告 / 赛博朋克2077");

// 点击继续
document.addEventListener("click", function(e){
  if(e.target.closest("button") || e.target.closest(".choice-btn") || e.target.closest(".evidence-panel") || e.target.closest(".verdict-btn")) return;
  if(e.target.closest("#evidence-overlay") || e.target.closest("#verdict-overlay")) return;
  if(document.getElementById("main-menu").style.display !== "none") return;
  if(document.getElementById("choices").classList.contains("hidden") === false) return;
  next();
});

// 键盘继续
document.addEventListener("keydown", function(e){
  if(e.key === " " || e.key === "Enter" || e.key === "ArrowRight"){
    e.preventDefault();
    if(document.getElementById("choices").classList.contains("hidden") === false) return;
    if(document.getElementById("evidence-overlay").classList.contains("show")) return;
    if(document.getElementById("verdict-overlay").classList.contains("show")) return;
    next();
  }
});
